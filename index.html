<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>元気 Genki Audio</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f5f9f7;
      --bg2:       #edf4f0;
      --white:     #ffffff;
      --border:    #deeae4;
      --border2:   #c8ddd4;
      --accent:    #5baa8a;
      --accent-lt: rgba(91,170,138,0.12);
      --accent-dk: #3f8f70;
      --soft-pink: #f8e8e8;
      --text:      #2d3d36;
      --text-2:    #5a7068;
      --text-3:    #8eada5;
      --text-4:    #b5cdc6;
      --sidebar-w: 200px;
      --radius:    14px;
      --radius-sm: 9px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* soft pastel background blobs */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 0%,   rgba(91,170,138,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(180,210,200,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 80% 10%,  rgba(248,232,232,0.5)  0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      height: 58px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .logo-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent-dk);
      letter-spacing: 0.02em;
    }
    .logo-en {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.01em;
    }

    /* pill tabs */
    .tabs {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .tab-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-3);
      background: none;
      border: 1.5px solid transparent;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.01em;
    }
    .tab-btn:hover {
      color: var(--accent);
      background: var(--accent-lt);
    }
    .tab-btn.active {
      color: var(--white);
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 3px 10px rgba(91,170,138,0.28);
    }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 18px 10px;
    }
    .sidebar::-webkit-scrollbar { width: 0; }

    .sb-label {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 0 8px 10px;
    }

    .ch-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      padding: 7px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .ch-btn:hover { background: var(--accent-lt); color: var(--accent-dk); }
    .ch-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 3px 10px rgba(91,170,138,0.25);
    }

    .ch-pill {
      width: 24px; height: 24px;
      border-radius: 7px;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      color: var(--text-3);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .ch-btn.active .ch-pill {
      background: rgba(255,255,255,0.25);
      color: white;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ch-header {
      margin-bottom: 22px;
      animation: fadeUp 0.22s ease;
    }
    .ch-header h2 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 3px;
    }
    .ch-header .meta {
      font-size: 12.5px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* ── Section label ── */
    .sec-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 20px 0 9px;
    }
    .sec-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    /* ── Audio list ── */
    .audio-list {
      background: rgba(255,255,255,0.85);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(91,170,138,0.07), 0 1px 0 rgba(255,255,255,0.9) inset;
      animation: fadeUp 0.28s ease;
    }

    .audio-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.13s;
    }
    .audio-row:last-child { border-bottom: none; }
    .audio-row:hover { background: rgba(91,170,138,0.04); }
    .audio-row.playing { background: rgba(91,170,138,0.08); }

    /* play button */
    .play-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--accent-lt);
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.16s;
    }
    .play-btn:hover {
      background: var(--accent);
      color: white;
      box-shadow: 0 3px 10px rgba(91,170,138,0.35);
      transform: scale(1.07);
    }
    .audio-row.playing .play-btn {
      background: var(--accent);
      color: white;
      box-shadow: 0 3px 10px rgba(91,170,138,0.3);
    }
    .play-btn svg { width: 11px; height: 11px; }
    .play-btn .tri { margin-left: 1.5px; }

    /* row info */
    .row-info { flex: 1; min-width: 0; }
    .row-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.005em;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .audio-row.playing .row-name { color: var(--accent-dk); }

    .row-prog {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .prog-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dk));
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .row-time {
      font-size: 11px;
      color: var(--text-4);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      min-width: 70px;
      text-align: right;
    }

    /* wave anim */
    @keyframes wb {
      0%,100% { transform: scaleY(0.3); }
      50%      { transform: scaleY(1); }
    }
    .wave { display: flex; align-items: center; gap: 2px; height: 13px; }
    .wb {
      width: 2.5px; border-radius: 2px;
      background: white;
      animation: wb 0.72s ease-in-out infinite;
    }
    .wb:nth-child(1){ height:55%; animation-delay:0s; }
    .wb:nth-child(2){ height:100%; animation-delay:.14s; }
    .wb:nth-child(3){ height:70%; animation-delay:.28s; }
    .wb:nth-child(4){ height:85%; animation-delay:.42s; }

    /* empty */
    .empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 260px;
      color: var(--text-4);
      gap: 12px;
      font-size: 13.5px;
      font-weight: 500;
    }
    .empty svg { opacity: 0.35; }

    /* little leaf decoration */
    .leaf {
      position: fixed;
      bottom: 28px; right: 32px;
      font-size: 48px;
      opacity: 0.07;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* ── iframe player overlay ── */
    .player-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,50,40,0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .player-overlay.open { display: flex; }

    .player-box {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 320px;
      max-width: 92vw;
      animation: fadeUp 0.2s ease;
    }

    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .player-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-close {
      width: 28px; height: 28px;
      border: none;
      background: var(--bg2);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--text-3);
      font-size: 16px;
      transition: background 0.15s;
    }
    .player-close:hover { background: var(--soft-pink); color: #c0504d; }

    .player-iframe {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--bg2);
    }

    .player-note {
      font-size: 11px;
      color: var(--text-4);
      text-align: center;
    }
    .player-note a {
      color: var(--accent);
      text-decoration: none;
    }
    .player-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="leaf">🍃</div>

<header>
  <div class="logo">
    <span class="logo-jp">元気</span>
    <span class="logo-en">Genki Audio Library</span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar"></aside>
  <section class="content" id="content"></section>
</div>

<!-- iframe audio player overlay -->
<div class="player-overlay" id="playerOverlay" onclick="closePlayer(event)">
  <div class="player-box">
    <div class="player-header">
      <div class="player-title" id="playerTitle">—</div>
      <button class="player-close" onclick="closePlayerBtn()">✕</button>
    </div>
    <iframe class="player-iframe" id="playerFrame" src="" allow="autoplay"></iframe>
    <div class="player-note">
      音声は Google Drive で再生されます。
      問題がある場合は <a id="playerLink" href="#" target="_blank">直接開く</a>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  let curBook = 'genki1_textbook';
  let curCh   = null;

  const BOOKS = [
    { key: 'genki1_textbook', label: 'Genki I Textbook'  },
    { key: 'genki1_workbook', label: 'Genki I Workbook'  },
    { key: 'genki2_textbook', label: 'Genki II Textbook' },
    { key: 'genki2_workbook', label: 'Genki II Workbook' },
  ];

  const SEC = { K: '会話 · Dialogue', Y: '読み物 · Reading' };

  // Convert any Google Drive URL format → /preview iframe URL
  function toPreviewUrl(url) {
    // Already a preview URL
    if (url.includes('/preview')) return url;
    // Extract file ID from common formats
    const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/) ||
              url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
    return url; // fallback: return as-is
  }

  // Convert any Google Drive URL → direct /view link for "open" button
  function toViewUrl(url) {
    const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/) ||
              url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m) return `https://drive.google.com/file/d/${m[1]}/view`;
    return url;
  }

  // Tabs
  const tabsEl = document.getElementById('tabs');
  BOOKS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (b.key === curBook ? ' active' : '');
    btn.textContent = b.label;
    btn.onclick = () => {
      curBook = b.key; curCh = null;
      document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', BOOKS[i].key === b.key));
      renderSidebar(); renderContent();
    };
    tabsEl.appendChild(btn);
  });

  // Sidebar
  function renderSidebar() {
    const el = document.getElementById('sidebar');
    const chs = Object.keys(audioData[curBook] || {}).sort();
    el.innerHTML = `<div class="sb-label">Chapters</div>`;
    chs.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'ch-btn' + (ch === curCh ? ' active' : '');
      btn.innerHTML = `<div class="ch-pill">${parseInt(ch)}</div>Chapter ${parseInt(ch)}`;
      btn.onclick = () => pickChapter(ch);
      el.appendChild(btn);
    });
    if (!curCh && chs.length) pickChapter(chs[0]);
  }

  function pickChapter(ch) {
    curCh = ch;
    document.querySelectorAll('.ch-btn').forEach(b => {
      b.classList.toggle('active', b.querySelector('.ch-pill')?.textContent == parseInt(ch));
    });
    renderContent();
  }

  // Content
  function renderContent() {
    const el = document.getElementById('content');
    if (!curCh) {
      el.innerHTML = `<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19V6l12-3v13M9 19c0 1.1-1.34 2-3 2s-3-.9-3-2 1.34-2 3-2 3 .9 3 2zm12-3c0 1.1-1.34 2-3 2s-3-.9-3-2 1.34-2 3-2 3 .9 3 2z"/></svg>Select a chapter to begin</div>`;
      return;
    }

    const files = (audioData[curBook][curCh] || []).slice().sort((a,b) => a.name.localeCompare(b.name));
    if (!files.length) {
      el.innerHTML = `<div class="empty">No audio files yet — add some to data.js ✨</div>`;
      return;
    }

    const groups = {};
    files.forEach(f => {
      const pre = (f.name.match(/^([A-Za-z]+)/)?.[1] || 'O').toUpperCase();
      if (!groups[pre]) groups[pre] = [];
      groups[pre].push(f);
    });

    const bk = BOOKS.find(b => b.key === curBook);
    let html = `<div class="ch-header"><h2>Chapter ${parseInt(curCh)}</h2><div class="meta">${bk.label} · ${files.length} tracks</div></div>`;

    Object.entries(groups).forEach(([pre, gf]) => {
      html += `<div class="sec-label">${SEC[pre] || 'Audio'}</div><div class="audio-list">`;
      gf.forEach((file, i) => {
        const id = `${curBook}-${curCh}-${pre}-${i}`;
        // Escape the URL safely for inline onclick
        const escapedUrl = file.url.replace(/'/g, "\\'");
        const escapedName = file.name.replace(/'/g, "\\'");
        html += `
          <div class="audio-row" id="row-${id}">
            <button class="play-btn" id="btn-${id}" onclick="openPlayer('${escapedUrl}','${escapedName}')">
              <svg viewBox="0 0 24 24" fill="currentColor" class="tri"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <div class="row-info">
              <div class="row-name">${file.name}</div>
              <div class="row-prog">
                <div class="prog-track">
                  <div class="prog-fill"></div>
                </div>
                <div class="row-time">— / —</div>
              </div>
            </div>
          </div>`;
      });
      html += `</div>`;
    });

    el.innerHTML = html;
  }

  // iframe Player overlay
  function openPlayer(url, name) {
    const previewUrl = toPreviewUrl(url);
    const viewUrl    = toViewUrl(url);
    document.getElementById('playerTitle').textContent = name;
    document.getElementById('playerFrame').src = previewUrl;
    document.getElementById('playerLink').href = viewUrl;
    document.getElementById('playerOverlay').classList.add('open');
  }

  function closePlayerBtn() {
    document.getElementById('playerOverlay').classList.remove('open');
    document.getElementById('playerFrame').src = ''; // stop audio
  }

  function closePlayer(e) {
    // only close if clicking the backdrop, not the box
    if (e.target === document.getElementById('playerOverlay')) closePlayerBtn();
  }

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePlayerBtn();
  });

  renderSidebar();
  renderContent();
</script>
</body>
</html>
