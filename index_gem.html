<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genki Audio Helper</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f9f9fb;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--primary-color); }
        p { color: var(--text-sub); font-size: 0.9rem; }

        .playlist {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .audio-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #eee;
        }

        .audio-item:hover {
            background-color: #f0edff;
            border-color: var(--primary-color);
        }

        .audio-item.active {
            background-color: var(--primary-color);
            color: white;
        }

        .audio-info { flex-grow: 1; }
        .chapter-tag { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; }
        .title { font-weight: 600; display: block; }

        .player-controls {
            background: #f1f2f6;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        /* 隐藏滚动条 */
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: #dfe6e9; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>元気 Genki Audio</h1>
        <p>进度：Chapter 1 - Greetings</p>
    </header>

    <div class="playlist" id="playlist">
        </div>

    <div class="player-controls">
        <div id="now-playing" style="font-size: 0.8rem; margin-bottom: 5px; font-weight: bold;">请选择音频</div>
        <audio id="main-player" controls src=""></audio>
    </div>
</div>

<script>
    // 1. 在这里填入你的 Google Drive 文件 ID
    const audioData = [
        { chapter: "Ch.1", title: "Vocabulary", driveId: "1ti8tcyioaOL23kLzCMfa1rl1hXqWggiI" },
        { chapter: "Ch.1", title: "Dialogue", driveId: "FILE_ID_2" },
        { chapter: "Ch.2", title: "Vocabulary", driveId: "FILE_ID_3" },
        { chapter: "Ch.2", title: "Reading", driveId: "FILE_ID_4" }
    ];

    const playlistEl = document.getElementById('playlist');
    const player = document.getElementById('main-player');
    const nowPlaying = document.getElementById('now-playing');

    // 2. 渲染列表
    audioData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'audio-item';
        div.innerHTML = `
            <div class="audio-info">
                <span class="chapter-tag">${item.chapter}</span>
                <span class="title">${item.title}</span>
            </div>
            <span style="font-size: 1.2rem;">▶️</span>
        `;
        
        div.onclick = () => {
            // 取消其他 active 状态
            document.querySelectorAll('.audio-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');

            // 转换 Google Drive 直链逻辑
            const directLink = `https://drive.google.com/uc?export=download&id=${item.driveId}`;
            player.src = directLink;
            player.play();
            nowPlaying.innerText = `正在播放: ${item.chapter} - ${item.title}`;
        };

        playlistEl.appendChild(div);
    });
</script>

</body>
</html>
